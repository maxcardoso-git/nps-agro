worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 200M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Upstreams (service names from docker-compose)
    upstream backend {
        server nps-backend:3310;
    }

    upstream user_portal {
        server nps-user-portal:3000;
    }

    upstream admin_console {
        server nps-admin-console:3000;
    }

    upstream analytics {
        server nps-analytics:3000;
    }

    server {
        listen 80;
        server_name _;

        # API requests -> backend (strips /api/ prefix)
        location /api/ {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check -> backend
        location /health {
            proxy_pass http://backend/health;
            proxy_set_header Host $host;
        }

        # Admin console -> /admin path (basePath configured in Next.js)
        location /admin {
            proxy_pass http://admin_console;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Analytics -> /analytics path (basePath configured in Next.js)
        location /analytics {
            proxy_pass http://analytics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Default -> user portal (main site)
        location / {
            proxy_pass http://user_portal;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
